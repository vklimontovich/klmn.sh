name: mtproxy

on:
  workflow_dispatch:
  push:
    paths:
      - infra/k8s/040-mtproxy/proxy/**
      - infra/k8s/040-mtproxy/Dockerfile
      - .github/workflows/mtproxy.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: infra/k8s/040-mtproxy
          push: true
          tags: ghcr.io/vklimontovich/mtproxy:latest
          no-cache: true
          platforms: linux/amd64,linux/arm64
