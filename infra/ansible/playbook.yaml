---
- name: Configure K3s cluster nodes
  hosts: all
  vars:
    github_token: "{{ lookup('env', 'GITHUB_TOKEN') }}"
    tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') }}"
    k3s_master: "fatman.klmn.sh"
    k3s_master_url: "https://{{ k3s_master }}:6443"
    k3s_version: "v1.32.3+k3s1"

  tasks:
    - name: Skip disabled hosts
      meta: end_host
      when: not (enabled | default(true))

    - name: Install Docker
      ansible.builtin.include_tasks:
        file: tasks/docker.yaml
        apply:
          tags: [docker]
      tags: [docker]

    - name: Install Tailscale
      ansible.builtin.include_tasks:
        file: tasks/tailscale.yaml
        apply:
          tags: [tailscale]
      tags: [tailscale]

    - name: Install K3s
      ansible.builtin.include_tasks:
        file: tasks/k3s.yaml
        apply:
          tags: [k3s]
      tags: [k3s]

    - name: Configure firewall
      ansible.builtin.include_tasks:
        file: tasks/firewall.yaml
        apply:
          tags: [firewall]
      tags: [firewall]

    - name: Setup xray via Docker (out of tailnet)
      ansible.builtin.include_tasks:
        file: tasks/xray-docker.yaml
        apply:
          tags: [xray]
      tags: [xray]

    - name: Setup manager user
      ansible.builtin.include_tasks:
        file: tasks/manager-user.yaml
        apply:
          tags: [manager-user]
      when: manager_user | default(false)
      tags: [manager-user]

  handlers:
    - name: Reload docker socket
      systemd:
        name: docker.socket
        state: restarted
        daemon_reload: true

    - name: Restart K3s
      systemd:
        name: k3s
        state: restarted
      when: inventory_hostname in groups['master']

    - name: Restart K3s agent
      systemd:
        name: k3s-agent
        state: restarted
      when: inventory_hostname in groups['workers']

    - name: Restart xray container
      community.docker.docker_container:
        name: xray
        state: started
        restart: true

- name: Configure enter (WireGuard relay) nodes
  hosts: enter
  vars:
    enter_exit_host: "{{ lookup('env', 'ENTER_EXIT_HOST') }}"
    enter_vless_uuid: "{{ lookup('env', 'ENTER_VLESS_UUID') }}"
    enter_vless_public_key: "{{ lookup('env', 'ENTER_VLESS_PUBLIC_KEY') }}"
    enter_vless_short_id: "{{ lookup('env', 'ENTER_VLESS_SHORT_ID') }}"
    enter_vless_sni: "{{ lookup('env', 'ENTER_VLESS_SNI') }}"
    wg_server_cidr: "10.8.0.1/22"
    wg_subnet: "10.8.0.0/22"

  tasks:
    - name: Skip disabled hosts
      meta: end_host
      when: not (enabled | default(true))

    - name: Setup WireGuard
      ansible.builtin.include_tasks:
        file: tasks/wireguard.yaml
        apply:
          tags: [wireguard]
      tags: [wireguard]

    - name: Setup Xray client (VLESS outbound)
      ansible.builtin.include_tasks:
        file: tasks/xray-client.yaml
        apply:
          tags: [xray-client]
      tags: [xray-client]

    - name: Setup WireGuard manager user
      ansible.builtin.include_tasks:
        file: tasks/wireguard-manager.yaml
        apply:
          tags: [wg-manager]
      tags: [wg-manager]

  handlers:
    - name: Restart WireGuard
      systemd:
        name: wg-quick@wg0
        state: restarted

    - name: Restart xray-client
      systemd:
        name: xray-client
        state: restarted
