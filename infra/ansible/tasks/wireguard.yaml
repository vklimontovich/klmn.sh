---
- name: Install wireguard-tools
  ansible.builtin.apt:
    name: wireguard-tools
    state: present
    update_cache: true

- name: Enable IP forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    sysctl_set: true
    reload: true

- name: Enable BBR congestion control
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop:
    - { name: net.core.default_qdisc, value: fq }
    - { name: net.ipv4.tcp_congestion_control, value: bbr }

- name: Create WireGuard peers directory
  file:
    path: /etc/wireguard/peers.d
    state: directory
    mode: "0700"

- name: Generate server keypair
  shell: wg genkey | tee /etc/wireguard/server.key | wg pubkey > /etc/wireguard/server.pub
  args:
    creates: /etc/wireguard/server.key

- name: Set permissions on server private key
  file:
    path: /etc/wireguard/server.key
    mode: "0600"

- name: Read server private key
  slurp:
    src: /etc/wireguard/server.key
  register: wg_server_key_b64

- name: Set WireGuard key facts
  set_fact:
    wg_server_private_key: "{{ wg_server_key_b64.content | b64decode | trim }}"

- name: Write wg0-base.conf
  copy:
    content: |
      [Interface]
      Address = {{ wg_server_cidr }}
      ListenPort = 51820
      PrivateKey = {{ wg_server_private_key }}
      MTU = {{ wg_mtu }}
    dest: /etc/wireguard/wg0-base.conf
    mode: "0600"
  notify: Restart WireGuard

- name: Write wg-sync script
  copy:
    content: |
      #!/bin/bash
      set -euo pipefail

      FULL_TMP=$(mktemp)
      SYNC_TMP=$(mktemp)
      trap 'rm -f "$FULL_TMP" "$SYNC_TMP"' EXIT

      {
        cat /etc/wireguard/wg0-base.conf
        find /etc/wireguard/peers.d/ -name '*.conf' -print0 | sort -z | xargs -0r cat
      } > "$FULL_TMP"

      grep -Ev '^(Address|MTU)\s*=' "$FULL_TMP" > "$SYNC_TMP"

      install -m 600 "$FULL_TMP" /etc/wireguard/wg0.conf
      install -m 600 "$SYNC_TMP" /etc/wireguard/wg0-sync.conf

      if ip link show wg0 >/dev/null 2>&1; then
        wg syncconf wg0 /etc/wireguard/wg0-sync.conf
        ip link set wg0 mtu {{ wg_mtu }}
        ip addr show wg0 | grep -qF '{{ wg_server_cidr }}' || ip addr add {{ wg_server_cidr }} dev wg0
      fi
    dest: /usr/local/bin/wg-sync
    mode: "0755"

- name: Render WireGuard configs
  command: /usr/local/bin/wg-sync
  changed_when: false

- name: Enable and start wg-quick@wg0
  systemd:
    name: wg-quick@wg0
    enabled: true
    state: started
