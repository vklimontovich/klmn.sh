---
- name: Install dependencies
  ansible.builtin.apt:
    name: [curl, nftables, unzip]
    state: present
    update_cache: true

- name: Create xray-client config directory
  ansible.builtin.file:
    path: /etc/xray-client
    state: directory
    mode: "0755"

- name: Create nftables config directory
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    mode: "0755"

- name: Resolve exit host IPv4 for tproxy bypass
  ansible.builtin.command: getent ahostsv4 {{ enter_exit_host }}
  register: enter_exit_host_lookup
  changed_when: false

- name: Set exit host IPv4 fact
  ansible.builtin.set_fact:
    enter_exit_host_ipv4: "{{ (enter_exit_host_lookup.stdout_lines | first).split()[0] }}"

- name: Write xray-client config
  # UDP traffic still rides a TCP-based REALITY transport here. That is fine for
  # baseline relay correctness, but it is not native QUIC or HTTP/3 support.
  ansible.builtin.copy:
    content: |
      {
        "log": {
          "loglevel": "warning"
        },
        "dns": {
          "servers": ["8.8.8.8", "1.1.1.1"]
        },
        "inbounds": [
          {
            "tag": "tproxy",
            "listen": "0.0.0.0",
            "port": 1080,
            "protocol": "dokodemo-door",
            "settings": {
              "network": "tcp,udp",
              "followRedirect": true
            },
            "streamSettings": {
              "sockopt": {
                "tproxy": "tproxy"
              }
            }
          }
        ],
        "outbounds": [
          {
            "tag": "vless-tcp",
            "protocol": "vless",
            "settings": {
              "vnext": [
                {
                  "address": "{{ enter_exit_host }}",
                  "port": 443,
                  "users": [
                    {
                      "id": "{{ enter_vless_uuid }}",
                      "encryption": "none"
                    }
                  ]
                }
              ]
            },
            "streamSettings": {
              "network": "tcp",
              "security": "reality",
              "realitySettings": {
                "serverName": "{{ enter_vless_sni }}",
                "fingerprint": "chrome",
                "publicKey": "{{ enter_vless_public_key }}",
                "shortId": "{{ enter_vless_short_id }}"
              }
            },
            "mux": {"enabled": true, "concurrency": 16, "xudpConcurrency": 16}
          },
          {
            "tag": "vless-udp",
            "protocol": "vless",
            "settings": {
              "vnext": [
                {
                  "address": "{{ enter_exit_host }}",
                  "port": 443,
                  "users": [
                    {
                      "id": "{{ enter_vless_uuid }}",
                      "encryption": "none"
                    }
                  ]
                }
              ]
            },
            "streamSettings": {
              "network": "tcp",
              "security": "reality",
              "realitySettings": {
                "serverName": "{{ enter_vless_sni }}",
                "fingerprint": "chrome",
                "publicKey": "{{ enter_vless_public_key }}",
                "shortId": "{{ enter_vless_short_id }}"
              }
            },
            "mux": {"enabled": true, "concurrency": 16, "xudpConcurrency": 16}
          },
          {
            "tag": "direct",
            "protocol": "freedom"
          }
        ],
        "routing": {
          "rules": [
            {"type": "field", "network": "tcp", "outboundTag": "vless-tcp"},
            {"type": "field", "network": "udp", "outboundTag": "vless-udp"}
          ]
        }
      }
    dest: /etc/xray-client/config.json
    mode: "0600"
  notify: Restart xray-client

- name: Download and install xray binary
  block:
    - name: Get latest xray release URL
      ansible.builtin.uri:
        url: https://api.github.com/repos/XTLS/Xray-core/releases/latest
        return_content: true
      register: xray_release

    - name: Download xray zip
      ansible.builtin.get_url:
        url: "{{ xray_release.json.assets | selectattr('name', 'equalto', 'Xray-linux-64.zip') | map(attribute='browser_download_url') | first }}"
        dest: /tmp/xray-linux-64.zip
        force: true

    - name: Extract xray binary
      ansible.builtin.unarchive:
        src: /tmp/xray-linux-64.zip
        dest: /usr/local/bin
        include:
          - xray
        remote_src: true
        mode: "0755"
      notify: Restart xray-client

    - name: Clean up zip
      ansible.builtin.file:
        path: /tmp/xray-linux-64.zip
        state: absent

- name: Write xray-client systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Xray client (VLESS+Reality outbound)
      After=network-online.target wg-tproxy.service
      Wants=network-online.target wg-tproxy.service

      [Service]
      ExecStart=/usr/local/bin/xray run -c /etc/xray-client/config.json
      Restart=always
      RestartSec=3
      LimitNOFILE=65536
      # Required for TPROXY: process must be able to receive transparently-proxied packets
      AmbientCapabilities=CAP_NET_ADMIN CAP_NET_BIND_SERVICE

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/xray-client.service
    mode: "0644"
  notify: Restart xray-client

- name: Write wg-relay nftables ruleset
  ansible.builtin.template:
    src: wg-relay.nft.j2
    dest: /etc/nftables.d/wg-relay.nft
    mode: "0644"
  notify: Restart wg-tproxy

- name: Initialize RU nftables include
  ansible.builtin.copy:
    content: |
      # Managed by /usr/local/bin/wg-relay refresh-ru.
    dest: /etc/nftables.d/wg-relay-ru.nft
    mode: "0644"
    force: false

- name: Write wg-relay helper
  ansible.builtin.template:
    src: wg-relay.sh.j2
    dest: /usr/local/bin/wg-relay
    mode: "0755"
  notify: Restart wg-tproxy

- name: Validate wg-relay nftables ruleset
  ansible.builtin.command: nft -c -f /etc/nftables.d/wg-relay.nft
  changed_when: false

- name: Check for legacy wg-tproxy teardown helper
  ansible.builtin.stat:
    path: /usr/local/bin/wg-tproxy-stop.sh
  register: legacy_wg_tproxy_stop

- name: Run legacy wg-tproxy teardown before nftables cutover
  ansible.builtin.command: /usr/local/bin/wg-tproxy-stop.sh
  when: legacy_wg_tproxy_stop.stat.exists

- name: Remove legacy RU refresh cron
  ansible.builtin.file:
    path: /etc/cron.d/ru-ipset-update
    state: absent

- name: Schedule daily RU nftables refresh
  ansible.builtin.copy:
    content: |
      0 3 * * * root /usr/local/bin/wg-relay refresh-ru >> /var/log/wg-relay-refresh.log 2>&1
    dest: /etc/cron.d/wg-relay-refresh
    mode: "0644"

- name: Remove legacy wg-tproxy helper scripts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/local/bin/update-ru-ipset.sh
    - /usr/local/bin/wg-tproxy-start.sh
    - /usr/local/bin/wg-tproxy-stop.sh

- name: Write wg-tproxy systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=WireGuard tproxy routing rules
      After=network-online.target systemd-networkd.service wg-quick@wg0.service docker.service
      Wants=network-online.target wg-quick@wg0.service
      PartOf=systemd-networkd.service wg-quick@wg0.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/local/bin/wg-relay apply

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/wg-tproxy.service
    mode: "0644"
  notify: Restart wg-tproxy

- name: Run initial RU nftables refresh
  ansible.builtin.command: /usr/local/bin/wg-relay refresh-ru

- name: Flush service restarts
  meta: flush_handlers

- name: Enable and start wg-tproxy
  ansible.builtin.systemd:
    name: wg-tproxy
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start xray-client
  ansible.builtin.systemd:
    name: xray-client
    enabled: true
    state: started
    daemon_reload: true
