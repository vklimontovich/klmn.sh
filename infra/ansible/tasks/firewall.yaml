---
# Disable IPv6 system-wide
- name: Disable IPv6
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    sysctl_set: true
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6

# SAFETY: Always ensure SSH access before any firewall changes

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

# CRITICAL: Allow SSH FIRST before any reset/changes
- name: Ensure SSH is allowed (safety)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "SSH - safety rule"

# Disable UFW before making changes (safer than reset)
- name: Disable UFW for safe reconfiguration
  community.general.ufw:
    state: disabled

- name: Reset UFW rules
  community.general.ufw:
    state: reset

# Re-add SSH immediately after reset
- name: Allow SSH (post-reset)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "SSH"

# Common ports for tailnet nodes
- name: Allow common ports (tailnet nodes)
  vars:
    common_ports:
      - { port: "80", proto: tcp, comment: "HTTP" }
      - { port: "443", proto: tcp, comment: "HTTPS" }
      - { port: "8443", proto: tcp, comment: "MTProxy" }
      - { port: "41641", proto: udp, comment: "Tailscale" }
      - { port: "6443", proto: tcp, comment: "k8s API" }
      - { port: "2379", proto: tcp, comment: "etcd client" }
      - { port: "2380", proto: tcp, comment: "etcd peer" }
      - { port: "10250", proto: tcp, comment: "Kubelet" }
      - { port: "10255", proto: tcp, comment: "Kubelet metrics" }
      - { port: "8472", proto: udp, comment: "Flannel VXLAN" }
      - { port: "30548", proto: tcp, comment: "NodePort xray" }
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ common_ports }}"
  when: not (out_of_tailnet | default(false))

# Ports for nodes outside tailnet (restricted kubelet access)
- name: Allow common ports (out of tailnet nodes)
  vars:
    common_ports:
      - { port: "80", proto: tcp, comment: "HTTP" }
      - { port: "443", proto: tcp, comment: "HTTPS" }
      - { port: "8443", proto: tcp, comment: "MTProxy" }
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ common_ports }}"
  when: out_of_tailnet | default(false)

# ICMP (ping) is allowed by default in /etc/ufw/before.rules
# No action needed - UFW allows ICMP by default

# Per-node custom ports from inventory (e.g., shadowbox)
- name: Allow custom TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: tcp
    comment: "{{ item.comment | default('custom') }}"
  loop: "{{ open_ports | default([]) }}"
  when: item.proto is not defined or item.proto in ['tcp', 'both']

- name: Allow custom UDP ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: udp
    comment: "{{ item.comment | default('custom') }}"
  loop: "{{ open_ports | default([]) }}"
  when: item.proto is defined and item.proto in ['udp', 'both']

# Enable UFW only after all rules are in place
- name: Set default deny incoming
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set default allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Enable UFW
  community.general.ufw:
    state: enabled
