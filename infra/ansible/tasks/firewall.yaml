---
# Source CIDRs that bypass rate limits. Tailnet for human/admin access,
# k3s pod/service CIDRs for the rare in-cluster traffic that escapes
# kube-proxy short-circuit and reaches the NodePort via the host network.
- name: Set firewall vars
  ansible.builtin.set_fact:
    tailnet_cidr: "100.64.0.0/10"
    k3s_pod_cidr: "10.42.0.0/16"
    k3s_svc_cidr: "10.43.0.0/16"

# Disable IPv6 system-wide
- name: Disable IPv6
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    sysctl_set: true
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6

# The all/default toggles above do NOT flush a global address an interface already
# grabbed via router advertisement at boot (kernel quirk). On residential nodes (e.g.
# ny-res behind a GL router handing out a dead IPv6 prefix) this leaves a broken global
# v6 address, which makes mtg/mtproxy hang dialing Telegram over v6. The per-interface
# toggle DOES flush it, so disable v6 explicitly on the default-route interface too.
- name: Disable IPv6 on the primary interface (flushes RA-assigned address)
  ansible.posix.sysctl:
    name: "net.ipv6.conf.{{ ansible_default_ipv4.interface }}.disable_ipv6"
    value: "1"
    state: present
    sysctl_set: true
    reload: true
  when: ansible_default_ipv4.interface is defined

# SAFETY: Always ensure SSH access before any firewall changes

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

# CRITICAL: Allow SSH FIRST before any reset/changes
- name: Ensure SSH is allowed (safety)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "SSH - safety rule"

# Disable UFW before making changes (safer than reset)
- name: Disable UFW for safe reconfiguration
  community.general.ufw:
    state: disabled

- name: Reset UFW rules
  community.general.ufw:
    state: reset

# Re-add SSH immediately after reset. Tailnet bypass first (no rate limit),
# then UFW's built-in `limit` for public traffic (6 new conns/30s/src).
- name: Allow SSH from tailnet (no rate limit)
  community.general.ufw:
    rule: allow
    from_ip: "{{ tailnet_cidr }}"
    port: "22"
    proto: tcp
    comment: "SSH from tailnet"

- name: Rate-limit SSH from public sources
  community.general.ufw:
    rule: limit
    port: "22"
    proto: tcp
    comment: "SSH (rate limit)"

# Common ports for tailnet nodes
- name: Allow common ports (tailnet nodes)
  vars:
    common_ports:
      - { port: "80", proto: tcp, comment: "HTTP" }
      - { port: "443", proto: tcp, comment: "HTTPS" }
      - { port: "8443:9442", proto: tcp, comment: "MTProxy" }
      - { port: "41641", proto: udp, comment: "Tailscale" }
      - { port: "6443", proto: tcp, comment: "k8s API" }
      - { port: "2379", proto: tcp, comment: "etcd client" }
      - { port: "2380", proto: tcp, comment: "etcd peer" }
      - { port: "10250", proto: tcp, comment: "Kubelet" }
      - { port: "10255", proto: tcp, comment: "Kubelet metrics" }
      - { port: "8472", proto: udp, comment: "Flannel VXLAN" }
      - { port: "30548", proto: tcp, comment: "NodePort xray" }
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ common_ports }}"
  when: not (out_of_tailnet | default(false))

# Ports for nodes outside tailnet (restricted kubelet access)
- name: Allow common ports (out of tailnet nodes)
  vars:
    common_ports:
      - { port: "80", proto: tcp, comment: "HTTP" }
      - { port: "443", proto: tcp, comment: "HTTPS" }
      - { port: "8443:9442", proto: tcp, comment: "MTProxy" }
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ common_ports }}"
  when: out_of_tailnet | default(false)

# ICMP (ping) is allowed by default in /etc/ufw/before.rules
# No action needed - UFW allows ICMP by default

# Per-node custom ports from inventory (e.g., shadowbox)
- name: Allow custom TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: tcp
    comment: "{{ item.comment | default('custom') }}"
  loop: "{{ open_ports | default([]) }}"
  when: item.proto is not defined or item.proto in ['tcp', 'both']

- name: Allow custom UDP ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: udp
    comment: "{{ item.comment | default('custom') }}"
  loop: "{{ open_ports | default([]) }}"
  when: item.proto is defined and item.proto in ['udp', 'both']

# Postgres NodePort (30432): protect from credential-stuffing without
# breaking the cluster or local testing.
#
#   - Tailnet + k3s pod/svc CIDRs are accepted unconditionally in
#     before.rules (runs before the hashlimit so trusted sources never
#     consume budget).
#   - Everyone else is throttled per-source-IP via xt_hashlimit:
#     60 new conns/min with a burst of 120. A normal psql session opens
#     1 connection; a brute-force scanner trying many user/pass combos
#     will saturate the bucket in seconds and get DROP'd. Tunable via
#     the --hashlimit-above / --hashlimit-burst values below.
- name: Custom per-source rate limit for Postgres NodePort (30432)
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    insertbefore: "^# don't delete the 'COMMIT' line"
    marker: "# {mark} ANSIBLE MANAGED - postgres NodePort rate limit"
    block: |2
      # Trusted sources bypass the hashlimit
      -A ufw-before-input -p tcp --dport 30432 -s {{ tailnet_cidr }} -j ACCEPT
      -A ufw-before-input -p tcp --dport 30432 -s {{ k3s_pod_cidr }} -j ACCEPT
      -A ufw-before-input -p tcp --dport 30432 -s {{ k3s_svc_cidr }} -j ACCEPT
      # Public sources: drop new connections exceeding 60/min per source IP (burst 120)
      -A ufw-before-input -p tcp --dport 30432 -m conntrack --ctstate NEW \
        -m hashlimit --hashlimit-above 60/minute --hashlimit-burst 120 \
        --hashlimit-mode srcip --hashlimit-name pg_rate -j DROP

- name: Allow Postgres NodePort (rate-limited via before.rules)
  community.general.ufw:
    rule: allow
    port: "30432"
    proto: tcp
    comment: "NodePort PostgreSQL (rate-limited)"
  when: not (out_of_tailnet | default(false))

# Enable UFW only after all rules are in place
- name: Set default deny incoming
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set default allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Enable UFW
  community.general.ufw:
    state: enabled
